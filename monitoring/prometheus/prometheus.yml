global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: '/metrics'

  # Headscale metrics
  - job_name: 'headscale'
    static_configs:
      - targets: ['headscale:9090']
    metrics_path: '/metrics'

  # Node Exporter (if installed)
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']

  # Postgres Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']