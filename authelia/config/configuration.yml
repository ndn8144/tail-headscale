# Authelia Configuration

# Server Configuration
server:
  host: 0.0.0.0
  port: 9091
  path: ""
  asset_path: /config/assets/
  headers:
    csp_template: ""
  buffers:
    read: 4096
    write: 4096
  timeouts:
    read: 6s
    write: 6s
    idle: 30s

# Logging
log:
  level: info
  format: json
  file_path: /data/authelia.log
  keep_stdout: true

# Theme & Branding
theme: auto
default_redirection_url: https://admin.company.vn

# Secrets (loaded from environment)
jwt_secret: ${JWT_SECRET}

# TOTP Configuration
totp:
  disable: false
  issuer: Company VPN
  algorithm: sha1
  digits: 6
  period: 30
  skew: 1
  secret_size: 32

# WebAuthn (Optional FIDO2 support)
webauthn:
  disable: false
  display_name: Company VPN
  attestation_conveyance_preference: indirect
  user_verification: preferred
  timeout: 60s

# Session Configuration
session:
  name: authelia_session
  domain: company.vn
  same_site: lax
  secret: ${SESSION_SECRET}
  expiration: 8h
  inactivity: 30m
  remember_me_duration: 30d

# Regulation (Brute Force Protection)
regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

# Storage Backend
storage:
  encryption_key: ${STORAGE_ENCRYPTION_KEY}
  postgres:
    host: headscale_postgres
    port: 5432
    database: authelia
    username: authelia
    password: ${AUTHELIA_DB_PASSWORD}
    schema: public
    ssl_mode: disable
    timeout: 5s

# Notification Provider (Email)
notifier:
  disable_startup_check: false
  smtp:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    timeout: 5s
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    sender: ${SMTP_USERNAME}
    identifier: localhost
    subject: "[Company VPN] {title}"
    startup_check_address: ${SMTP_USERNAME}
    disable_require_tls: false
    disable_html_emails: false

# Authentication Backend
authentication_backend:
  password_reset:
    disable: false
    custom_url: ""
  refresh_interval: 5m
  file:
    path: /config/users.yml
    password:
      algorithm: argon2id
      iterations: 3
      salt_length: 16
      parallelism: 4
      memory: 65536

# Access Control Rules
access_control:
  default_policy: deny
  networks:
    - name: internal
      networks: ["100.64.0.0/16", "10.0.0.0/8", "192.168.0.0/16", "172.16.0.0/12"]
  rules:
    # Headscale server access
    - domain: "tailscale.company.vn"
      policy: two_factor
      subject: "group:headscale-users"
    
    # Headplane admin access
    - domain: "admin.company.vn"
      policy: two_factor
      subject: "group:headscale-admins"
    
    # Authelia domain (public for callbacks)
    - domain: "auth.company.vn"
      policy: bypass

# Identity Providers (OIDC)
identity_providers:
  oidc:
    hmac_secret: ${OIDC_HMAC_SECRET}
    issuer_private_key: |
      ${OIDC_PRIVATE_KEY}
    
    access_token_lifespan: 8h
    authorize_code_lifespan: 1m
    id_token_lifespan: 1h
    refresh_token_lifespan: 90d
    
    enable_client_debug_messages: false
    minimum_parameter_entropy: 8
    
    cors:
      endpoints:
        - authorization
        - token
        - revocation
        - introspection
      allowed_origins_from_client_redirect_uris: true
    
    clients:
      # Headscale OIDC Client
      - id: headscale-client
        description: Headscale VPN Server
        secret: ${HEADSCALE_OIDC_SECRET}
        public: false
        authorization_policy: headscale_policy
        audience: []
        scopes:
          - openid
          - profile
          - groups
          - email
        redirect_uris:
          - https://tailscale.company.vn/oidc/callback
        grant_types:
          - authorization_code
        response_types:
          - code
        response_modes:
          - query
          - form_post
        userinfo_signing_algorithm: none
        
      # Headplane Admin UI Client
      - id: headscale-ui-client
        description: Headplane Admin UI
        secret: ${HEADPLANE_OIDC_SECRET}
        public: false
        authorization_policy: headplane_policy
        audience: []
        scopes:
          - openid
          - profile
          - groups
          - email
        redirect_uris:
          - https://admin.company.vn/admin/oidc/callback
        grant_types:
          - authorization_code
        response_types:
          - code
        response_modes:
          - query
          - form_post
        userinfo_signing_algorithm: none

# Authorization Policies
authorization_policies:
  headscale_policy:
    default_policy: deny
    rules:
      - policy: two_factor
        subject: "group:headscale-users"
        
  headplane_policy:
    default_policy: deny
    rules:
      - policy: two_factor
        subject: "group:headscale-admins"