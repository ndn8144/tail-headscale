# Headplane Configuration

# HTTP Server Configuration
http:
  host: '0.0.0.0'
  port: 3000
  public_url: "https://admin.company.vn"

# User storage file for permissions
user_storage_file: "/var/lib/headplane/users.json"

# Headscale Integration
headscale:
  url: "http://headscale:8080"
  config_path: "/etc/headscale/config.yaml"
  dns_records_path: "/etc/headscale/dns_records.json"
  config_strict: true

# Integration Configuration - Docker Mode (Integrated)
integration:
  docker:
    enabled: true
    # Use container label for discovery
    container_label:
      name: "com.headplane.selector"
      value: "headscale"
    # Fallback: direct container name
    # container_name: "headscale"
    socket: "unix:///var/run/docker.sock"
  
  kubernetes:
    enabled: false
    
  proc:
    enabled: false

# OIDC Configuration
oidc:
  issuer: "https://auth.company.vn"
  client_id: "headscale-ui-client"
  client_secret: "${HEADPLANE_OIDC_SECRET}"
  
  # Authentication settings
  disable_api_key_login: false
  token_endpoint_auth_method: "client_secret_post"
  
  # API key for fallback authentication
  headscale_api_key: "${HEADSCALE_ROOT_API_KEY}"
  
  # Callback URL
  redirect_uri: "https://admin.company.vn/admin/oidc/callback"

# TLS Configuration (disabled since using Traefik)
# tls:
#   enabled: false